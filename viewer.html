<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover"
    >

    <meta name="robots" content="noindex, nofollow">

    <title>Portfolio</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            overflow: hidden;

            background: #151515;
            color: #ffffff;

            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Helvetica Neue",
                Helvetica,
                Arial,
                sans-serif;
        }

        .toolbar {
            min-height: 58px;
            flex-shrink: 0;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;

            padding: 8px 14px;

            background: rgba(18, 18, 18, 0.98);
            border-bottom: 1px solid rgba(255, 255, 255, 0.13);
        }

        .toolbar a,
        .toolbar button {
            min-width: 86px;
            padding: 9px 12px;

            border: 1px solid rgba(255, 255, 255, 0.42);
            background: transparent;
            color: #ffffff;

            font: inherit;
            font-size: 11px;
            letter-spacing: 0.12em;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;

            cursor: pointer;

            transition:
                background 0.2s ease,
                color 0.2s ease,
                opacity 0.2s ease;
        }

        .toolbar a:hover,
        .toolbar button:hover {
            background: #ffffff;
            color: #111111;
        }

        .toolbar button:disabled {
            opacity: 0.25;
            cursor: default;
        }

        .toolbar button:disabled:hover {
            background: transparent;
            color: #ffffff;
        }

        #page-counter {
            min-width: 100px;

            font-size: 11px;
            letter-spacing: 0.12em;
            text-align: center;
        }

        .viewer {
            position: relative;
            flex: 1;
            min-height: 0;

            display: flex;
            align-items: center;
            justify-content: center;

            padding: 22px;
            overflow: auto;
        }

        #pdf-canvas {
            display: block;

            max-width: 100%;
            max-height: 100%;

            background: #ffffff;
            box-shadow: 0 14px 48px rgba(0, 0, 0, 0.5);

            opacity: 0;
            transition: opacity 0.35s ease;
        }

        #pdf-canvas.visible {
            opacity: 1;
        }

        #status {
            position: absolute;
            left: 50%;
            bottom: 14px;
            transform: translateX(-50%);

            font-size: 9px;
            letter-spacing: 0.14em;
            text-transform: uppercase;

            opacity: 0.5;
        }

        #status.hidden {
            display: none;
        }

        #error-message {
            display: none;

            max-width: 560px;
            padding: 32px;

            font-size: 12px;
            line-height: 1.7;
            letter-spacing: 0.12em;
            text-align: center;
            text-transform: uppercase;
        }

        #error-message.visible {
            display: block;
        }

        #error-message a {
            color: #ffffff;
        }

        @media (max-width: 700px) {
            .toolbar {
                gap: 6px;
                padding: 8px;
            }

            .toolbar a,
            .toolbar button {
                min-width: auto;
                padding: 8px;
                font-size: 9px;
            }

            #page-counter {
                min-width: 64px;
                font-size: 9px;
            }

            .viewer {
                padding: 8px;
            }
        }
    </style>
</head>

<body>

    <header class="toolbar">
        <a href="index.html">Back</a>

        <button id="previous" type="button">
            Previous
        </button>

        <div id="page-counter">—</div>

        <button id="next" type="button">
            Next
        </button>
    </header>

    <main class="viewer" id="viewer">
        <canvas id="pdf-canvas"></canvas>

        <div id="status">
            Loading
        </div>

        <div id="error-message">
            The portfolio could not be loaded.<br>
            <a href="portfolio.pdf" target="_blank">
                Open the PDF directly
            </a>
        </div>
    </main>

    <script type="module">
        import * as pdfjsLib from
            "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.min.mjs";

        pdfjsLib.GlobalWorkerOptions.workerSrc =
            "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.worker.min.mjs";

        const PDF_FILE =
            new URL("./portfolio.pdf", window.location.href).href;

        const viewer =
            document.getElementById("viewer");

        const canvas =
            document.getElementById("pdf-canvas");

        const context =
            canvas.getContext("2d");

        const pageCounter =
            document.getElementById("page-counter");

        const previousButton =
            document.getElementById("previous");

        const nextButton =
            document.getElementById("next");

        const status =
            document.getElementById("status");

        const errorMessage =
            document.getElementById("error-message");

        let pdfDocument = null;
        let currentPage = 1;
        let activeRenderTask = null;
        let resizeTimer = null;
        let renderToken = 0;

        async function renderCurrentPage() {
            if (!pdfDocument) {
                return;
            }

            const token = ++renderToken;

            if (activeRenderTask) {
                activeRenderTask.cancel();
                activeRenderTask = null;
            }

            const page =
                await pdfDocument.getPage(currentPage);

            const baseViewport =
                page.getViewport({ scale: 1 });

            const availableWidth =
                Math.max(240, viewer.clientWidth - 44);

            const availableHeight =
                Math.max(240, viewer.clientHeight - 44);

            const scaleByWidth =
                availableWidth / baseViewport.width;

            const scaleByHeight =
                availableHeight / baseViewport.height;

            const displayScale =
                Math.min(scaleByWidth, scaleByHeight);

            const pixelRatio =
                Math.min(window.devicePixelRatio || 1, 2);

            const displayViewport =
                page.getViewport({
                    scale: displayScale
                });

            const renderViewport =
                page.getViewport({
                    scale: displayScale * pixelRatio
                });

            canvas.width =
                Math.floor(renderViewport.width);

            canvas.height =
                Math.floor(renderViewport.height);

            canvas.style.width =
                `${Math.floor(displayViewport.width)}px`;

            canvas.style.height =
                `${Math.floor(displayViewport.height)}px`;

            activeRenderTask = page.render({
                canvasContext: context,
                viewport: renderViewport
            });

            try {
                await activeRenderTask.promise;

                if (token !== renderToken) {
                    return;
                }

                canvas.classList.add("visible");
                status.classList.add("hidden");

                pageCounter.textContent =
                    `${currentPage} / ${pdfDocument.numPages}`;

                previousButton.disabled =
                    currentPage === 1;

                nextButton.disabled =
                    currentPage === pdfDocument.numPages;
            } catch (error) {
                if (
                    error?.name !==
                    "RenderingCancelledException"
                ) {
                    throw error;
                }
            } finally {
                activeRenderTask = null;
            }
        }

        previousButton.addEventListener(
            "click",
            async function () {
                if (currentPage > 1) {
                    currentPage -= 1;
                    await renderCurrentPage();
                }
            }
        );

        nextButton.addEventListener(
            "click",
            async function () {
                if (
                    pdfDocument &&
                    currentPage < pdfDocument.numPages
                ) {
                    currentPage += 1;
                    await renderCurrentPage();
                }
            }
        );

        document.addEventListener(
            "keydown",
            function (event) {
                if (event.key === "ArrowLeft") {
                    previousButton.click();
                }

                if (event.key === "ArrowRight") {
                    nextButton.click();
                }

                if (event.key === "Escape") {
                    window.location.href = "index.html";
                }
            }
        );

        window.addEventListener(
            "resize",
            function () {
                clearTimeout(resizeTimer);

                resizeTimer = setTimeout(
                    renderCurrentPage,
                    180
                );
            }
        );

        async function loadPortfolio() {
            try {
                const loadingTask =
                    pdfjsLib.getDocument({
                        url: PDF_FILE,
                        disableRange: true,
                        disableStream: true
                    });

                pdfDocument =
                    await loadingTask.promise;

                await renderCurrentPage();
            } catch (error) {
                console.error(error);

                status.classList.add("hidden");
                canvas.style.display = "none";
                errorMessage.classList.add("visible");
            }
        }

        loadPortfolio();
    </script>

</body>
</html>
