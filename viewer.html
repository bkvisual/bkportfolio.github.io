<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover"
    >

    <meta name="robots" content="noindex, nofollow">

    <title>Portfolio Viewer</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            flex-direction: column;

            overflow: hidden;

            background: #151515;
            color: #fff;

            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Helvetica Neue",
                Helvetica,
                Arial,
                sans-serif;
        }

        .toolbar {
            min-height: 58px;
            flex-shrink: 0;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;

            padding:
                max(8px, env(safe-area-inset-top))
                14px
                8px;

            background: rgba(18, 18, 18, 0.97);
            border-bottom: 1px solid rgba(255, 255, 255, 0.13);
        }

        .toolbar a,
        .toolbar button {
            min-width: 86px;
            padding: 9px 12px;

            border: 1px solid rgba(255, 255, 255, 0.42);
            background: transparent;
            color: #fff;

            font: inherit;
            font-size: 11px;
            letter-spacing: 0.12em;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;

            cursor: pointer;

            transition:
                background 0.2s ease,
                color 0.2s ease,
                opacity 0.2s ease;
        }

        .toolbar a:hover,
        .toolbar button:hover {
            background: #fff;
            color: #111;
        }

        .toolbar button:disabled {
            opacity: 0.25;
            cursor: default;
        }

        .toolbar button:disabled:hover {
            background: transparent;
            color: #fff;
        }

        #page-counter {
            min-width: 100px;

            font-size: 11px;
            letter-spacing: 0.12em;
            text-align: center;
            text-transform: uppercase;
        }

        .viewer {
            position: relative;
            flex: 1;
            min-height: 0;

            display: flex;
            align-items: center;
            justify-content: center;

            padding: 22px;
            overflow: auto;

            background: #151515;
        }

        #pdf-canvas {
            display: block;

            max-width: 100%;
            max-height: 100%;

            background: white;
            box-shadow: 0 14px 48px rgba(0, 0, 0, 0.48);
        }

        #loading-message {
            position: absolute;
            inset: 0;

            display: flex;
            align-items: center;
            justify-content: center;

            padding: 30px;

            font-size: 12px;
            letter-spacing: 0.14em;
            line-height: 1.7;
            text-align: center;
            text-transform: uppercase;

            background: #151515;
            z-index: 2;
        }

        #loading-message.hidden {
            display: none;
        }

        .error {
            color: #fff;
            max-width: 560px;
        }

        @media (max-width: 700px) {
            .toolbar {
                gap: 6px;
                padding-left: 8px;
                padding-right: 8px;
            }

            .toolbar a,
            .toolbar button {
                min-width: auto;
                padding: 8px 9px;
                font-size: 9px;
            }

            #page-counter {
                min-width: 64px;
                font-size: 9px;
            }

            .viewer {
                padding: 8px;
                align-items: flex-start;
            }

            #pdf-canvas {
                max-height: none;
            }
        }
    </style>
</head>

<body>

    <header class="toolbar">
        <a href="index.html">Back</a>

        <button id="previous" type="button">
            Previous
        </button>

        <div id="page-counter">
            Loading
        </div>

        <button id="next" type="button">
            Next
        </button>
    </header>

    <main class="viewer" id="viewer">
        <div id="loading-message">
            Loading portfolio
        </div>

        <canvas id="pdf-canvas"></canvas>
    </main>

    <script type="module">
        import * as pdfjsLib from
            "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.7.284/build/pdf.min.mjs";

        pdfjsLib.GlobalWorkerOptions.workerSrc =
            "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.7.284/build/pdf.worker.min.mjs";

        const PDF_FILE = "portfolio.pdf";

        const viewer =
            document.getElementById("viewer");

        const canvas =
            document.getElementById("pdf-canvas");

        const context =
            canvas.getContext("2d");

        const loadingMessage =
            document.getElementById("loading-message");

        const previousButton =
            document.getElementById("previous");

        const nextButton =
            document.getElementById("next");

        const pageCounter =
            document.getElementById("page-counter");

        let pdfDocument = null;
        let currentPage = 1;
        let activeRenderTask = null;
        let renderSequence = 0;
        let resizeTimer = null;

        async function renderCurrentPage() {
            if (!pdfDocument) {
                return;
            }

            const sequence = ++renderSequence;

            if (activeRenderTask) {
                activeRenderTask.cancel();
                activeRenderTask = null;
            }

            const page =
                await pdfDocument.getPage(currentPage);

            const initialViewport =
                page.getViewport({ scale: 1 });

            const availableWidth =
                Math.max(240, viewer.clientWidth - 44);

            const availableHeight =
                Math.max(240, viewer.clientHeight - 44);

            const scaleByWidth =
                availableWidth / initialViewport.width;

            const scaleByHeight =
                availableHeight / initialViewport.height;

            let displayScale;

            if (window.innerWidth <= 700) {
                displayScale = scaleByWidth;
            } else {
                displayScale =
                    Math.min(scaleByWidth, scaleByHeight);
            }

            const pixelRatio =
                Math.min(window.devicePixelRatio || 1, 2);

            const displayViewport =
                page.getViewport({
                    scale: displayScale
                });

            const renderViewport =
                page.getViewport({
                    scale: displayScale * pixelRatio
                });

            canvas.width =
                Math.floor(renderViewport.width);

            canvas.height =
                Math.floor(renderViewport.height);

            canvas.style.width =
                `${Math.floor(displayViewport.width)}px`;

            canvas.style.height =
                `${Math.floor(displayViewport.height)}px`;

            activeRenderTask = page.render({
                canvasContext: context,
                viewport: renderViewport
            });

            try {
                await activeRenderTask.promise;

                if (sequence !== renderSequence) {
                    return;
                }

                loadingMessage.classList.add("hidden");

                pageCounter.textContent =
                    `${currentPage} / ${pdfDocument.numPages}`;

                previousButton.disabled =
                    currentPage <= 1;

                nextButton.disabled =
                    currentPage >= pdfDocument.numPages;
            } catch (error) {
                if (
                    error?.name !==
                    "RenderingCancelledException"
                ) {
                    throw error;
                }
            } finally {
                activeRenderTask = null;
            }
        }

        previousButton.addEventListener(
            "click",
            async function () {
                if (currentPage > 1) {
                    currentPage -= 1;
                    await renderCurrentPage();
                }
            }
        );

        nextButton.addEventListener(
            "click",
            async function () {
                if (
                    pdfDocument &&
                    currentPage < pdfDocument.numPages
                ) {
                    currentPage += 1;
                    await renderCurrentPage();
                }
            }
        );

        document.addEventListener(
            "keydown",
            function (event) {
                if (event.key === "ArrowLeft") {
                    previousButton.click();
                }

                if (event.key === "ArrowRight") {
                    nextButton.click();
                }

                if (event.key === "Escape") {
                    window.location.href = "index.html";
                }
            }
        );

        window.addEventListener(
            "resize",
            function () {
                clearTimeout(resizeTimer);

                resizeTimer = setTimeout(
                    renderCurrentPage,
                    180
                );
            }
        );

        async function loadPortfolio() {
            try {
                const loadingTask =
                    pdfjsLib.getDocument(PDF_FILE);

                pdfDocument =
                    await loadingTask.promise;

                await renderCurrentPage();
            } catch (error) {
                console.error(error);

                loadingMessage.classList.remove("hidden");
                loadingMessage.classList.add("error");

                loadingMessage.innerHTML =
                    "The portfolio could not be loaded.<br>" +
                    "Check that the PDF is named exactly " +
                    "<strong>portfolio.pdf</strong>.";
            }
        }

        loadPortfolio();
    </script>

</body>
</html>
